<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uma flor pra você, Dai</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255, 150, 196, 0.75), transparent 35%),
        linear-gradient(135deg, #ffd1e6 0%, #ffb3d1 45%, #ff8fbd 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #442236;
      overflow: hidden;
    }

    .card {
      width: 100%;
      max-width: 720px;
      padding: 38px 24px;
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 80px rgba(111, 64, 91, 0.22);
      text-align: center;
      position: relative;
      z-index: 2;
      animation: aparecer 1s ease both;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4.2rem);
      line-height: 1.05;
      color: #4b203b;
      margin-bottom: 18px;
      letter-spacing: -1.5px;
    }

    .subtitle {
      font-size: clamp(1rem, 2.3vw, 1.2rem);
      line-height: 1.7;
      color: #67475c;
      max-width: 580px;
      margin: 0 auto 24px;
    }

    .score {
      margin: 18px auto;
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.75);
      color: #7b3d62;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(128, 70, 105, 0.12);
    }

    button {
      border: none;
      cursor: pointer;
      padding: 16px 26px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff5fa2, #ff8fbd);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      box-shadow: 0 18px 35px rgba(255, 95, 162, 0.35);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      margin-top: 8px;
    }

    button:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 24px 45px rgba(255, 95, 162, 0.45);
    }

    .game-area {
      position: relative;
      width: 100%;
      height: 330px;
      margin-top: 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.8);
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.55);
      display: none;
    }

    .flower {
      position: absolute;
      top: -50px;
      font-size: 36px;
      cursor: pointer;
      user-select: none;
      animation: cair 4s linear forwards;
      filter: drop-shadow(0 8px 10px rgba(130, 53, 92, 0.18));
    }

    .final {
      display: none;
      margin-top: 28px;
      animation: aparecerFlor 0.9s ease both;
    }

    .flor-grande {
      font-size: 6rem;
      animation: pulse 1.8s ease-in-out infinite;
      margin-bottom: 14px;
    }

    .mensagem {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.8), 0 18px 45px rgba(125, 68, 101, 0.13);
      color: #4d2d42;
      font-size: clamp(1.1rem, 2.7vw, 1.45rem);
      line-height: 1.6;
      font-weight: 600;
    }

    .assinatura {
      margin-top: 18px;
      color: #7b526b;
      font-size: 0.95rem;
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes cair {
      from {
        top: -50px;
        transform: rotate(0deg);
      }
      to {
        top: 110%;
        transform: rotate(180deg);
      }
    }

    @keyframes aparecerFlor {
      from {
        opacity: 0;
        transform: translateY(22px) scale(0.92);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
    }

    @media (max-width: 600px) {
      .card {
        padding: 30px 18px;
        border-radius: 28px;
      }

      button {
        width: 100%;
      }

      .game-area {
        height: 360px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>Pra você Dai 🌸</h1>

    <p class="subtitle" id="textoInicial">
      PPara ganhar sua mensagem, você precisa vencer 3 fases e pegar 30 flores.
    </p>

    <div class="score" id="score">
     Fase: 1/3 | Flores: 0/30 | Erros: 0/10 | Tempo: 60s
    </div>

    <br>

    <button id="startButton" onclick="iniciarJogo()">
      Começar joguinho
    </button>

    <div class="game-area" id="gameArea"></div>

    <section class="final" id="final">
      <div class="flor-grande">🌸</div>

      <div class="mensagem">
        Espero que seu dia seja maravilhoso como a mulher que você é.
      </div>

      <p class="assinatura">
        Minhas porcentagens subiram um pouquinho ?
      </p>
    </section>
  </main>

<script>
  let pontos = 0;
  let erros = 0;
  let tempo = 60;
  let fase = 1;

  let intervaloFlores;
  let intervaloTempo;

  const totalFlores = 30;
  const maxErros = 10;

  function iniciarJogo() {
    pontos = 0;
    erros = 0;
    tempo = 60;
    fase = 1;

    document.getElementById("score").innerText =
      "Fase: 1/3 | Flores: 0/30 | Erros: 0/10 | Tempo: 60s";

    document.getElementById("gameArea").style.display = "block";
    document.getElementById("final").style.display = "none";
    document.getElementById("startButton").style.display = "none";
    document.getElementById("textoInicial").innerText =
      "Pegue as flores rosas 🌸, evite as falsas 🌺 e cuidado com o tempo!";

    document.querySelector(".flor-grande").innerText = "🌸";

    intervaloFlores = setInterval(criarFlor, 650);

    intervaloTempo = setInterval(() => {
      tempo--;
      atualizarFase();
      atualizarScore();

      if (tempo <= 0) {
        perderJogo("O tempo acabou 😭");
      }
    }, 1000);
  }

  function atualizarFase() {
    if (pontos >= 20) {
      fase = 3;
    } else if (pontos >= 10) {
      fase = 2;
    } else {
      fase = 1;
    }
  }

  function atualizarScore() {
    document.getElementById("score").innerText =
      "Fase: " + fase + "/3 | Flores: " + pontos + "/30 | Erros: " + erros + "/10 | Tempo: " + tempo + "s";
  }

  function criarFlor() {
    const gameArea = document.getElementById("gameArea");
    const flor = document.createElement("div");

    flor.classList.add("flower");

    const sorteio = Math.random();

    let tipo = "normal";

    if (sorteio < 0.25) {
      tipo = "falsa";
      flor.innerText = "🌺";
    } else if (sorteio < 0.33) {
      tipo = "especial";
      flor.innerText = "💐";
    } else if (sorteio < 0.40) {
      tipo = "perigosa";
      flor.innerText = "🥀";
    } else {
      tipo = "normal";
      flor.innerText = "🌸";
    }

    const larguraArea = gameArea.offsetWidth;
    const posicaoX = Math.random() * (larguraArea - 50);

    flor.style.left = posicaoX + "px";

    const tamanho = Math.floor(Math.random() * 20) + 24;
    flor.style.fontSize = tamanho + "px";

    let velocidade;

    if (fase === 1) {
      velocidade = Math.random() * 1.4 + 2.6;
    } else if (fase === 2) {
      velocidade = Math.random() * 1.1 + 2.0;
    } else {
      velocidade = Math.random() * 0.9 + 1.5;
    }

    flor.style.animationDuration = velocidade + "s";

    flor.onclick = function () {
      if (tipo === "normal") {
        pontos++;
      }

      if (tipo === "especial") {
        pontos += 3;
        tempo += 3;
      }

      if (tipo === "falsa") {
        erros += 2;
      }

      if (tipo === "perigosa") {
        erros += 3;
        tempo -= 5;
      }

      atualizarFase();
      atualizarScore();
      flor.remove();

      if (pontos >= totalFlores) {
        finalizarJogo();
      }

      if (erros >= maxErros) {
        perderJogo("Você errou flores demais 😭");
      }

      if (tempo <= 0) {
        perderJogo("O tempo acabou 😭");
      }
    };

    gameArea.appendChild(flor);

    setTimeout(() => {
      if (gameArea.contains(flor)) {
        if (tipo === "normal") {
          erros++;
        }

        if (tipo === "especial") {
          erros++;
        }

        atualizarScore();

        if (erros >= maxErros) {
          perderJogo("Você deixou muitas flores escaparem 😭");
        }

        flor.remove();
      }
    }, velocidade * 1000);
  }

  function finalizarJogo() {
    clearInterval(intervaloFlores);
    clearInterval(intervaloTempo);

    document.getElementById("gameArea").style.display = "none";
    document.getElementById("final").style.display = "block";

    document.getElementById("score").innerText =
      "Você venceu! Pegou " + pontos + " flores 🌸";

    document.getElementById("textoInicial").innerText =
      "Você conseguiu passar todas as fases!";

    document.querySelector(".flor-grande").innerText = "🌸";

    document.querySelector(".mensagem").innerText =
      "Espero que seu dia seja maravilhoso como a mulher que você é. Você venceu o joguinho, então oficialmente merece uma flor, um sorriso e umas porcentagens a mais comigo.";
  }

  function perderJogo(motivo) {
    clearInterval(intervaloFlores);
    clearInterval(intervaloTempo);

    document.getElementById("gameArea").style.display = "none";
    document.getElementById("final").style.display = "block";

    document.getElementById("score").innerText = motivo;
    document.getElementById("textoInicial").innerText = "Quase conseguiu!";

    document.querySelector(".flor-grande").innerText = "🥀";

    document.querySelector(".mensagem").innerText =
      "Você perdeu... mas como eu sou generoso, vou deixar você tentar de novo. A flor ainda está te esperando 🌸";

    document.getElementById("startButton").style.display = "inline-block";
    document.getElementById("startButton").innerText = "Tentar de novo";
  }
</script>
</body>
</html>
