<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uma flor pra você, Dai</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255, 150, 196, 0.75), transparent 35%),
        linear-gradient(135deg, #ffd1e6 0%, #ffb3d1 45%, #ff8fbd 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #442236;
      overflow: hidden;
    }

    .hearts span {
      position: fixed;
      bottom: -40px;
      font-size: 24px;
      opacity: 0.35;
      animation: subir 8s linear infinite;
      pointer-events: none;
    }

    .hearts span:nth-child(1) { left: 8%; animation-delay: 0s; }
    .hearts span:nth-child(2) { left: 25%; animation-delay: 2s; }
    .hearts span:nth-child(3) { left: 70%; animation-delay: 1s; }
    .hearts span:nth-child(4) { left: 88%; animation-delay: 3s; }

    .card {
      width: 100%;
      max-width: 720px;
      padding: 42px 28px;
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 80px rgba(111, 64, 91, 0.22);
      text-align: center;
      position: relative;
      z-index: 2;
      animation: aparecer 1s ease both;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4.5rem);
      line-height: 1.05;
      color: #4b203b;
      margin-bottom: 18px;
      letter-spacing: -1.5px;
    }

    .subtitle {
      font-size: clamp(1rem, 2.3vw, 1.2rem);
      line-height: 1.7;
      color: #67475c;
      max-width: 580px;
      margin: 0 auto 30px;
    }

    button {
      border: none;
      cursor: pointer;
      padding: 16px 26px;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff5fa2, #ff8fbd);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      box-shadow: 0 18px 35px rgba(255, 95, 162, 0.35);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    button:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 24px 45px rgba(255, 95, 162, 0.45);
    }

    .surpresa {
      display: none;
      margin-top: 36px;
      animation: aparecerFlor 0.9s ease both;
    }

    .flor {
      position: relative;
      width: 150px;
      height: 210px;
      margin: 0 auto 24px;
    }

    .miolo {
      position: absolute;
      top: 55px;
      left: 50%;
      width: 54px;
      height: 54px;
      background: #ffd1e6;
      border-radius: 50%;
      transform: translateX(-50%);
      z-index: 3;
      box-shadow: inset 0 0 0 6px rgba(255, 143, 189, 0.7);
    }

    .petala {
      position: absolute;
      width: 62px;
      height: 86px;
      background: linear-gradient(135deg, #ff5fa2, #ffc1dc);
      border-radius: 60px 60px 20px 20px;
      top: 10px;
      left: 44px;
      transform-origin: 31px 70px;
      box-shadow: 0 10px 22px rgba(255, 126, 179, 0.25);
    }

    .petala:nth-child(1) { transform: rotate(0deg); }
    .petala:nth-child(2) { transform: rotate(60deg); }
    .petala:nth-child(3) { transform: rotate(120deg); }
    .petala:nth-child(4) { transform: rotate(180deg); }
    .petala:nth-child(5) { transform: rotate(240deg); }
    .petala:nth-child(6) { transform: rotate(300deg); }

    .caule {
      position: absolute;
      top: 108px;
      left: 50%;
      width: 10px;
      height: 100px;
      background: linear-gradient(#4caf50, #2e7d32);
      border-radius: 999px;
      transform: translateX(-50%);
      z-index: 1;
    }

    .folha {
      position: absolute;
      top: 145px;
      width: 54px;
      height: 28px;
      background: #66bb6a;
      border-radius: 80px 10px 80px 10px;
      z-index: 2;
    }

    .folha.esquerda {
      left: 30px;
      transform: rotate(-25deg);
    }

    .folha.direita {
      right: 30px;
      transform: rotate(205deg);
    }

    .mensagem {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.8), 0 18px 45px rgba(125, 68, 101, 0.13);
      color: #4d2d42;
      font-size: clamp(1.1rem, 2.7vw, 1.45rem);
      line-height: 1.6;
      font-weight: 600;
    }

    .assinatura {
      margin-top: 18px;
      color: #7b526b;
      font-size: 0.95rem;
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes aparecerFlor {
      from {
        opacity: 0;
        transform: translateY(22px) scale(0.92);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes subir {
      0% {
        transform: translateY(0) rotate(0deg) scale(0.8);
        opacity: 0;
      }
      15% {
        opacity: 0.38;
      }
      100% {
        transform: translateY(-110vh) rotate(25deg) scale(1.2);
        opacity: 0;
      }
    }

    @media (max-width: 600px) {
      .card {
        padding: 32px 20px;
        border-radius: 28px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="hearts">
    <span>🌸</span>
    <span>✨</span>
    <span>💕</span>
    <span>🌷</span>
  </div>

  <main class="card">
    <h1>Minhas porcentagens subiram um pouquinho ? 🌸</h1>

    <p class="subtitle">
      Fiz uma coisinha simples, mas com carinho.  
      Clica no botão aqui embaixo.
    </p>

    <button onclick="mostrarFlor()">
      Clique para receber uma flor
    </button>

    <section class="surpresa" id="surpresa">
      <div class="flor">
        <div class="petala"></div>
        <div class="petala"></div>
        <div class="petala"></div>
        <div class="petala"></div>
        <div class="petala"></div>
        <div class="petala"></div>

        <div class="miolo"></div>
        <div class="caule"></div>
        <div class="folha esquerda"></div>
        <div class="folha direita"></div>
      </div>
    </section>
  </main>

  <script>
    function mostrarFlor() {
      const surpresa = document.getElementById("surpresa");
      surpresa.style.display = "block";
    }
  </script>
</body>
</html>
