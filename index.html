<script>
  const gameArea = document.getElementById("gameArea");
  const player = document.getElementById("player");
  const scoreElement = document.getElementById("score");
  const startButton = document.getElementById("startButton");
  const finalSection = document.getElementById("final");
  const aviso = document.getElementById("aviso");

  let jogoAtivo = false;
  let pulando = false;

  let pontos = 0;
  let camas = 0;
  let vidas = 1;

  let velocidade = 11;
  let gravidade = 1;
  let forcaPulo = 16.2;

  let posicaoY = 54;
  let velocidadeY = 0;

  let intervaloLoop;
  let intervaloCriacao;
  let intervaloPontuacao;

  const totalCamas = 30;
  const chao = 54;

  function iniciarJogo() {
    jogoAtivo = true;
    pulando = false;

    pontos = 0;
    camas = 0;
    vidas = 1;

    velocidade = 11;
    gravidade = 1;
    forcaPulo = 16.2;

    posicaoY = chao;
    velocidadeY = 0;

    limparObjetos();

    player.style.bottom = chao + "px";

    gameArea.style.display = "block";
    finalSection.style.display = "none";
    startButton.style.display = "none";
    aviso.style.display = "none";

    document.getElementById("textoInicial").innerText =
      "Toque na tela para pular. Fuja do frio ❄️ e colete 30 camas 🛏️ para vencer.";

    atualizarScore();

    clearInterval(intervaloLoop);
    clearInterval(intervaloCriacao);
    clearInterval(intervaloPontuacao);

    intervaloLoop = setInterval(loopJogo, 16);

    intervaloCriacao = setInterval(criarObjeto, 650);

    intervaloPontuacao = setInterval(() => {
      if (!jogoAtivo) return;

      pontos++;

      if (pontos % 15 === 0) {
        velocidade += 0.35;
      }

      atualizarScore();
    }, 450);
  }

  function pular() {
    if (!jogoAtivo) return;

    if (!pulando) {
      pulando = true;
      velocidadeY = forcaPulo;
      player.classList.add("pulando");

      setTimeout(() => {
        player.classList.remove("pulando");
      }, 260);
    }
  }

  function loopJogo() {
    aplicarFisica();
    moverObjetos();
    verificarColisoes();
  }

  function aplicarFisica() {
    if (pulando) {
      posicaoY += velocidadeY;
      velocidadeY -= gravidade;

      if (posicaoY <= chao) {
        posicaoY = chao;
        velocidadeY = 0;
        pulando = false;
      }

      player.style.bottom = posicaoY + "px";
    }
  }

  function criarObjeto() {
    if (!jogoAtivo) return;

    const objeto = document.createElement("div");
    const sorteio = Math.random();

    if (sorteio < 0.74) {
      objeto.classList.add("obstaculo");
      objeto.dataset.tipo = "frio";

      const inimigos = ["❄️", "🥶", "🌬️", "🧊"];
      objeto.innerText = inimigos[Math.floor(Math.random() * inimigos.length)];

      if (Math.random() < 0.22) {
        objeto.style.bottom = "88px";
      }
    } else {
      objeto.classList.add("cama");
      objeto.dataset.tipo = "cama";

      const camasLista = ["🛏️", "🛌", "🛏️", "🛌"];
      objeto.innerText = camasLista[Math.floor(Math.random() * camasLista.length)];

      const alturas = [112, 132, 152, 170];
      const alturaAleatoria = alturas[Math.floor(Math.random() * alturas.length)];
      objeto.style.bottom = alturaAleatoria + "px";
    }

    objeto.style.right = "-70px";
    gameArea.appendChild(objeto);
  }

  function moverObjetos() {
    const objetos = document.querySelectorAll(".obstaculo, .cama");

    objetos.forEach((objeto) => {
      let rightAtual = parseFloat(objeto.style.right || "-70");
      rightAtual += velocidade;
      objeto.style.right = rightAtual + "px";

      if (rightAtual > gameArea.offsetWidth + 100) {
        objeto.remove();
      }
    });
  }

  function verificarColisoes() {
    const playerRect = player.getBoundingClientRect();
    const objetos = document.querySelectorAll(".obstaculo, .cama");

    objetos.forEach((objeto) => {
      const objetoRect = objeto.getBoundingClientRect();

      const colidiu =
        playerRect.left < objetoRect.right - 8 &&
        playerRect.right > objetoRect.left + 8 &&
        playerRect.top < objetoRect.bottom - 8 &&
        playerRect.bottom > objetoRect.top + 8;

      if (!colidiu) return;

      if (objeto.dataset.tipo === "cama") {
        camas++;
        pontos += 20;
        velocidade += 0.45;

        mostrarAviso("+1 cama 🛏️ O frio ficou um pouco mais rápido!");
        objeto.remove();

        if (camas >= totalCamas) {
          finalizarJogo();
        }
      }

      if (objeto.dataset.tipo === "frio") {
        vidas--;

        mostrarAviso("O frio encostou! 🥶");
        objeto.remove();

        if (vidas <= 0) {
          perderJogo();
        }
      }

      atualizarScore();
    });
  }

  function atualizarScore() {
    scoreElement.innerText =
      "Pontos: " + pontos + " | Camas: " + camas + "/" + totalCamas + " | Vidas: " + vidas;
  }

  function mostrarAviso(texto) {
    aviso.innerText = texto;
    aviso.style.display = "block";

    setTimeout(() => {
      aviso.style.display = "none";
    }, 850);
  }

  function finalizarJogo() {
    jogoAtivo = false;

    clearInterval(intervaloLoop);
    clearInterval(intervaloCriacao);
    clearInterval(intervaloPontuacao);

    limparObjetos();

    gameArea.style.display = "none";
    finalSection.style.display = "block";
    aviso.style.display = "none";

    scoreElement.innerText =
      "Você venceu! Pegou " + camas + " camas e fez " + pontos + " pontos 🛏️";

    document.getElementById("textoInicial").innerText =
      "Missão concluída: o frio foi derrotado.";

    document.getElementById("iconeFinal").innerText = "🌸";

    document.getElementById("mensagemFinal").innerHTML =
      `
        <div style="font-size: 4rem; margin-bottom: 12px;">
          🛏️🌸💗🌸🛏️
        </div>

        <p>
          Você venceu o frio, pulou todos os perigos e coletou as 30 camas do caminho.
        </p>

        <p style="margin-top: 14px;">
          Como recompensa, você ganhou flores rosas, carinho, descanso merecido e uma música para deixar seu dia mais bonito.
        </p>

        <a 
          href="https://music.youtube.com/watch?v=e1bbTt_zFbc&si=njvXvx1fwLPMreL9" 
          target="_blank"
          style="
            display: inline-block;
            margin-top: 22px;
            padding: 14px 22px;
            border-radius: 999px;
            background: linear-gradient(135deg, #ff5fa2, #ff8fbd);
            color: white;
            text-decoration: none;
            font-weight: 800;
            box-shadow: 0 14px 30px rgba(255, 95, 162, 0.35);
          "
        >
          Tocar música do seu dia 🎵
        </a>
      `;

    document.getElementById("assinatura").innerText =
      "Espero que seu dia seja maravilhoso como a mulher que você é.";
  }

  function perderJogo() {
    jogoAtivo = false;

    clearInterval(intervaloLoop);
    clearInterval(intervaloCriacao);
    clearInterval(intervaloPontuacao);

    limparObjetos();

    gameArea.style.display = "none";
    finalSection.style.display = "block";
    aviso.style.display = "none";

    scoreElement.innerText =
      "O frio venceu dessa vez 🥶 | Pontos: " + pontos + " | Camas: " + camas + "/" + totalCamas;

    document.getElementById("textoInicial").innerText = "Quase conseguiu!";

    document.getElementById("iconeFinal").innerText = "🥶";

    document.getElementById("mensagemFinal").innerText =
      "Você perdeu... o frio foi forte dessa vez. Agora só tem 1 vida, então precisa desviar com cuidado e coletar as 30 camas.";

    document.getElementById("assinatura").innerText =
      "A revanche está liberada.";

    startButton.style.display = "inline-block";
    startButton.innerText = "Tentar de novo";
  }

  function limparObjetos() {
    const objetos = document.querySelectorAll(".obstaculo, .cama");
    objetos.forEach((objeto) => objeto.remove());
  }

  startButton.addEventListener("click", iniciarJogo);

  gameArea.addEventListener("click", pular);

  gameArea.addEventListener("touchstart", function (event) {
    event.preventDefault();
    pular();
  }, { passive: false });

  document.addEventListener("keydown", function (event) {
    if (event.code === "Space" || event.code === "ArrowUp") {
      event.preventDefault();
      pular();
    }
  });
</script>
